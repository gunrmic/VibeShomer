name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Dummy prompt values for CI — tests verify these are set, not their content
  PROMPT_SYSTEM: ci-test
  PROMPT_OUTPUT_FORMAT: ci-test
  PROMPT_SECURITY_NEXTJS: ci-test
  PROMPT_PERFORMANCE_NEXTJS: ci-test
  PROMPT_SECURITY_EXPRESS: ci-test
  PROMPT_PERFORMANCE_EXPRESS: ci-test
  PROMPT_SECURITY_DJANGO: ci-test
  PROMPT_PERFORMANCE_DJANGO: ci-test
  PROMPT_SECURITY_FASTAPI: ci-test
  PROMPT_PERFORMANCE_FASTAPI: ci-test
  PROMPT_SECURITY_RAILS: ci-test
  PROMPT_PERFORMANCE_RAILS: ci-test
  PROMPT_SECURITY_GO: ci-test
  PROMPT_PERFORMANCE_GO: ci-test
  PROMPT_SECURITY_GENERIC_JS: ci-test
  PROMPT_PERFORMANCE_GENERIC_JS: ci-test
  PROMPT_SECURITY_GENERIC_PYTHON: ci-test
  PROMPT_PERFORMANCE_GENERIC_PYTHON: ci-test

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn build
        env:
          ANTHROPIC_API_KEY: dummy-key-for-build

      - name: Unit & integration tests
        run: yarn test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: yarn test:e2e
        env:
          ANTHROPIC_API_KEY: dummy-key-for-e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
