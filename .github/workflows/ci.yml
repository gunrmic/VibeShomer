name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn build
        env:
          ANTHROPIC_API_KEY: dummy-key-for-build
          PROMPT_SYSTEM: test
          PROMPT_OUTPUT_FORMAT: test

      - name: Unit & integration tests
        run: yarn test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: yarn test:e2e
        env:
          ANTHROPIC_API_KEY: dummy-key-for-e2e
          PROMPT_SYSTEM: test
          PROMPT_OUTPUT_FORMAT: test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
